<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input de Escolh</title>
</head>
<body>
    <h1>Input de escolha</h1>
    <form action="./">
        <label for="opção">
            <input type="radio" name="Opção">Opção 1
        </label>
        <label for="opção">
            <input type="radio" name="Opção" checked>Opção 2
        </label>
        <label for="opção">
            <input type="radio" name="Opção">Opção 3
        </label>
        <br>
        <form action="./">
        <label for="opção">
            <input type="checkbox" name="Opções" id="Opcao1">Opção 1
        </label>
        <label for="opção">
            <input type="checkbox" name="Opções" id="Opcao2" checked>Opção 2
        </label>
        <label for="opção">
            <input type="checkbox" name="Opções" id="Opcao3">Opção 3
        </label>
    </form>
</body>
</html>
