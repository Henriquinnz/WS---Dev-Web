<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIVIDADE 3</title>
</head>
<body>
    <h2>Cursos Favoritos</h2>

    <form>

        <input type="checkbox" id="html" name="curso" value="HTML">
        <label for="html">HTML</label><br>

        <input type="checkbox" id="css" name="curso" value="CSS">
        <label for="css">CSS</label><br>

        <input type="checkbox" id="js" name="curso" value="JavaScript">
        <label for="js">JavaScript</label><br>

        <h2>Escolha uma estação do ano</h2>

        <input type="radio" id="verao" name="estacao" value="Verão">
        <label for="verao">Verão</label><br>

        <input type="radio" id="outono" name="estacao" value="Outono">
        <label for="outono">Outono</label><br>

        <input type="radio" id="inverno" name="estacao" value="Inverno">
        <label for="inverno">Inverno</label><br>

        <input type="radio" id="primavera" name="estacao" value="Primavera">
        <label for="primavera">Primavera</label>

    </form>
</body>
</html>
