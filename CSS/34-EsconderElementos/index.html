<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econder Elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Forma de esconder elementos</h1>
    <h2>Display None</h2>
    <div class="exemplo">
        <div class="caixa normal">Caixa</div>
        <div class="caixa display">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>Visibility hidden</h2>
    <div class="exemplo">
        <div class="caixa normal">Caixa</div>
        <div class="caixa visibility-hidden">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>opacity</h2>
    <div class="exemplo">
        <div class="caixa normal">Caixa</div>
        <div class="caixa opacity-zero">Caixa Oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>    
</body>
</html>
