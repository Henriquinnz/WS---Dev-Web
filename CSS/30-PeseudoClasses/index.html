<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pseudo Classes</h1>
    <h2>Houver</h2>
    <button>Clique quise vc e curioso</button>
    <h2>:focus</h2>
    <input type="text" placeholder="Clique aqui para focar">
    <h2>:active</h2>
    <button>Clique e segure</button>
    <h2>:visited</h2>
    <a href="#">Clique</a>
    <h2>:checkd</h2>
    <lanbel for=""> 
        <input type="checkbox">
    </lanbel>
    <h2>:Disabled</h2>
    <input type="text" volue="Desabilitado" disabled>
    <h2>:First-child, :last-child, :nth-child(n)</h2>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Utimo</li>
    </ul>  
</body>
</html>
